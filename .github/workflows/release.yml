name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: make test

      - name: Build .app bundle
        run: bash scripts/create-app-bundle.sh dist

      - name: Create .dmg
        run: bash scripts/create-dmg.sh dist

      - name: Prepare release assets
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DMG="dist/iCloud-NFS-Exporter-${VERSION#v}.dmg"
          # Rename with version tag
          mv "$DMG" "dist/iCloud-NFS-Exporter-${VERSION}.dmg"
          mv "$DMG.sha256" "dist/iCloud-NFS-Exporter-${VERSION}.dmg.sha256"
          echo "DMG=dist/iCloud-NFS-Exporter-${VERSION}.dmg" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            ${{ env.DMG }}
            ${{ env.DMG }}.sha256
